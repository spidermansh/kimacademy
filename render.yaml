# Render Blueprint — deploy Kim Academy v3 (1 web service: frontend + backend) + Neon PostgreSQL.
# Dùng: trên render.com → New → Blueprint → chọn repo này. Sau đó điền 3 secret bên dưới.
services:
  - type: web
    name: kim-academy
    runtime: node
    region: singapore # gần Việt Nam + cùng vùng Neon
    plan: free
    branch: main
    # --include=dev: BẮT BUỘC cài devDependencies (vite/esbuild/prisma/tsx) dù NODE_ENV=production.
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # dán chuỗi Neon (nên dùng bản KHÔNG -pooler cho migrate)
      - key: JWT_SECRET
        sync: false # chuỗi bí mật bất kỳ (đặt dài, ngẫu nhiên)
      - key: CORS_ORIGIN
        sync: false # = URL app sau khi tạo, vd https://kim-academy.onrender.com
