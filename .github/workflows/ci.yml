name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kimacademy
          POSTGRES_PASSWORD: kimacademy
          POSTGRES_DB: kimacademy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kimacademy -d kimacademy_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://kimacademy:kimacademy@localhost:5432/kimacademy_test?schema=public
      JWT_SECRET: ci-test-secret-change-me
      CORS_ORIGIN: http://localhost:3025

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run lint
      - run: npm run build
      - run: npm test

